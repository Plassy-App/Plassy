name: Deploy to production

on:
  push:
    tags:
      - "v*"
      - "!v*-preview.*"
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Production deploy (OTA or build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@plassy-app"

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          packager: bun
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Verify Expo authentication
        run: |
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "::error::EXPO_TOKEN repository secret is missing."
            exit 1
          fi
          eas whoami

      - name: Install dependencies
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun install --frozen-lockfile

      - name: Run production EAS workflow
        run: eas workflow:run .eas/workflows/production-deploy.yml --non-interactive

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Production deploy"
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Workflow: \`.eas/workflows/production-deploy.yml\`"
            echo "- Check expo.dev for build / OTA / submit status"
          } >> "$GITHUB_STEP_SUMMARY"
