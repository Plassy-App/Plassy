# Production deploy manual fallback on expo.dev (auto deploy runs via GitHub Actions on release tag).
name: Deploy to production (manual)

on:
  workflow_dispatch: {}

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    environment: production

  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint]
    type: get-build
    params:
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}
      profile: production
      platform: ios

  build_ios:
    name: Build iOS production
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: production

  submit_ios_build:
    name: Submit iOS to App Store Connect
    needs: [build_ios]
    if: ${{ needs.build_ios.outputs.build_id }}
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production

  publish_ios_update:
    name: Publish iOS OTA update
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    environment: production
    params:
      channel: production
      platform: ios
      message: Manual production deploy
