name: Deploy to preview

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-preview-${{ github.workflow }}-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Railway preview
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PREVIEW }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify Railway token
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::RAILWAY_TOKEN_PREVIEW repository secret is missing."
            exit 1
          fi

      - name: Verify NODE_AUTH_TOKEN secret
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NODE_AUTH_TOKEN repository secret is missing."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Sync NODE_AUTH_TOKEN for GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          printf '%s' "$NODE_AUTH_TOKEN" | railway variable set NODE_AUTH_TOKEN \
            --stdin \
            --service=fe11f8d3-6c0a-4ce5-b5ff-1dc3e9d7674b \
            --environment=preview

      - name: Deploy to Railway preview
        run: railway up --service=fe11f8d3-6c0a-4ce5-b5ff-1dc3e9d7674b --environment=preview --detach

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Preview deploy"
            echo "- Environment: **preview**"
            echo "- Commit: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
