name: Deploy to production

on:
  push:
    tags:
      - "v*"
      - "!v*-preview.*"
  workflow_dispatch:

concurrency:
  group: deploy-production-${{ github.workflow }}-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Railway production
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_PRODUCTION }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Verify Railway token
        run: |
          if [ -z "${RAILWAY_TOKEN:-}" ]; then
            echo "::error::RAILWAY_TOKEN_PRODUCTION repository secret is missing."
            exit 1
          fi

      - name: Verify NODE_AUTH_TOKEN secret
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NODE_AUTH_TOKEN repository secret is missing."
            exit 1
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Sync NODE_AUTH_TOKEN for GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          printf '%s' "$NODE_AUTH_TOKEN" | railway variable set NODE_AUTH_TOKEN \
            --stdin \
            --service=b49322b1-0be5-4ec8-be93-21640bd2a692 \
            --environment=production

      - name: Deploy to Railway production
        run: railway up --service=b49322b1-0be5-4ec8-be93-21640bd2a692 --environment=production --detach

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "### Production deploy"
            echo "- Environment: **production**"
            echo "- Tag: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- URL: https://api.plassy.fr"
          } >> "$GITHUB_STEP_SUMMARY"
