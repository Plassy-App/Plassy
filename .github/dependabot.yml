version: 2
updates:
  # Umbrella workspace only. Submodule packages (plassy-app, plassy-backend, …)
  # live in separate private repos; Dependabot cannot clone them from here.
  # Configure bun updates in each submodule repo's own dependabot.yml instead.
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
