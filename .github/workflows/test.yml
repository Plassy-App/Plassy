name: Test

on:
  pull_request:
  push:
    branches: [main, dev]

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          [
            plassy-contracts,
            plassy-backend,
            plassy-app,
            plassy-frontend,
            plassy-scraper,
          ]
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          submodules: recursive
          # Default GITHUB_TOKEN cannot clone other private repos (submodules).
          token: ${{ secrets.SUBMODULES_PAT }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@plassy-app"

      - name: Install and run tests with coverage
        working-directory: ${{ matrix.package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bun install --frozen-lockfile
          bun run test:coverage 2>&1 | tee coverage-output.txt

      - name: Coverage summary
        if: always()
        working-directory: ${{ matrix.package }}
        run: |
          {
            echo "### ${{ matrix.package }}"
            echo '```'
            grep -A 6 "All files" coverage-output.txt || echo "No coverage table found"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-${{ matrix.package }}
          path: ${{ matrix.package }}/coverage/
          retention-days: 14

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.13

      - name: Audit workspace dependencies (high severity)
        run: bun run audit:high
